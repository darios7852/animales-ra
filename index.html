
<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html,body{
margin:0;
height:100%;
}
model-viewer{
width:100%;
height:100%;
}
</style>
</head>

<body>

<model-viewer
src="patchwork_holstein_cow.glb"
camera-controls
auto-rotate
ar
ar-modes="scene-viewer webxr"
ar-placement="floor">

<button slot="ar-button"
style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
padding:14px 25px;font-size:18px;border:none;border-radius:8px;cursor:pointer;">
🐄 Ver en Realidad Aumentada
</button>

</model-viewer>

</body>
</html>
